<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matric Nejma - مركز التحميل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(12px); }
        .modal-bg { background: rgba(0, 0, 0, 0.8); transition: opacity 0.3s ease; }
        .animate-in { animation: fadeInUp 0.5s ease forwards; }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-950 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full glass rounded-[2.5rem] p-10 shadow-2xl text-center border border-slate-200">
        
        <div class="mb-6">
            <div class="bg-indigo-600 text-white w-20 h-20 rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-indigo-500/30">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">تطبيق Matric Nejma</h1>
            <p class="text-slate-500 text-sm mt-2 leading-relaxed">أكمل خطوات الأمان الست لفتح قفل التحميل وكود التفعيل الخاص بك</p>
        </div>

        <div id="progressArea">
            <div class="flex justify-between mb-2 px-1">
                <span id="stepText" class="text-xs font-bold text-indigo-600 uppercase tracking-tighter">الخطوة 1 من 6</span>
                <span id="percentText" class="text-xs font-bold text-slate-400">0%</span>
            </div>
            <div class="w-full bg-slate-100 rounded-full h-3 mb-8 overflow-hidden border border-slate-200">
                <div id="progressBar" class="bg-indigo-600 h-full transition-all duration-700 ease-in-out" style="width: 0%"></div>
            </div>
        </div>

        <div id="stepContent">
            <button id="actionBtn" onclick="handleStep()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-5 rounded-2xl shadow-xl transition-all active:scale-95 text-lg flex items-center justify-center gap-3">
                <span>ابدأ التحقق الآن</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 rotate-180" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd" />
                </svg>
            </button>
        </div>

        <div id="finalActions" class="hidden space-y-4 animate-in">
            <div class="bg-emerald-50 text-emerald-700 p-4 rounded-2xl mb-4 font-bold border border-emerald-100">
                ✨ تم فتح جميع الميزات بنجاح
            </div>
            
            <a id="downloadLink" href="#" class="flex items-center justify-center gap-3 w-full bg-slate-900 hover:bg-black text-white font-bold py-5 rounded-2xl shadow-2xl transition-all transform hover:-translate-y-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                </svg>
                تحميل التطبيق (APK)
            </a>

            <button onclick="toggleModal(true)" class="flex items-center justify-center gap-3 w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-5 rounded-2xl shadow-xl transition-all transform hover:-translate-y-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />
                </svg>
                عرض كود التفعيل
            </button>
        </div>

        <p class="mt-10 text-[10px] text-slate-400 font-medium tracking-[0.2em] uppercase">Security Cloud Verification v4.0</p>
    </div>

    <div id="codeModal" class="fixed inset-0 modal-bg hidden flex items-center justify-center z-50 p-6">
        <div class="bg-white rounded-[2.5rem] max-w-sm w-full p-10 text-center shadow-2xl transform transition-all duration-300">
            <div class="bg-amber-100 text-amber-600 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.040L3 14.535a4.52 4.52 0 001.223 3.303A11.934 11.934 0 0112 21.056a11.934 11.934 0 018.777-3.218 4.52 4.52 0 001.223-3.303l-1.391-9.551z" />
                </svg>
            </div>
            <h2 class="text-xl font-bold text-slate-800 mb-2">كود التفعيل جاهز</h2>
            <p class="text-slate-500 text-sm mb-6">استخدم هذا الكود داخل التطبيق لتفعيل الميزات</p>
            <div id="activationCodeDisplay" class="bg-slate-50 border-2 border-dashed border-indigo-200 p-5 rounded-2xl text-2xl font-mono font-bold text-indigo-700 mb-8 select-all">
                </div>
            <button onclick="toggleModal(false)" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-4 rounded-2xl transition-all">
                رجوع
            </button>
        </div>
    </div>

    <script>
        // --- متغيرات التحكم ---
        const totalSteps = 6;
        const activationCode = "M-7700-X92"; // يمكنك تغيير كود التفعيل من هنا
        const appDownloadUrl = "https://www.mediafire.com/file/15bqlfrrzlzklmi/Matric+Nejma+6+V3.0.apk/file"; // ضع رابط التحميل هنا
        
        // الروابط التي زودتني بها
        const smartLinks = [
            "https://omg10.com/4/10823571",
            "https://omg10.com/4/10823570",
            "https://omg10.com/4/10823569",
            "https://omg10.com/4/10534480",
            "https://omg10.com/4/10508415",
            "https://omg10.com/4/10823593"
        ];

        let currentStep = 1;

        // العناصر
        const actionBtn = document.getElementById('actionBtn');
        const stepText = document.getElementById('stepText');
        const percentText = document.getElementById('percentText');
        const progressBar = document.getElementById('progressBar');
        const stepContent = document.getElementById('stepContent');
        const finalActions = document.getElementById('finalActions');
        const progressArea = document.getElementById('progressArea');
        const codeDisplay = document.getElementById('activationCodeDisplay');
        const downloadLink = document.getElementById('downloadLink');

        function updateUI() {
            if (currentStep > totalSteps) {
                progressArea.classList.add('hidden');
                stepContent.classList.add('hidden');
                finalActions.classList.remove('hidden');
                downloadLink.href = appDownloadUrl;
                codeDisplay.innerText = activationCode;
            } else {
                const percent = Math.round(((currentStep - 1) / totalSteps) * 100);
                stepText.innerText = `الخطوة ${currentStep} من ${totalSteps}`;
                percentText.innerText = `${percent}%`;
                progressBar.style.width = `${percent}%`;
                
                const labels = ["فحص نظام الأمان", "تشفير قناة الاتصال", "التحقق من السيرفر", "تجاوز بروتوكول الحماية", "مزامنة البيانات", "إنشاء مفتاح التفعيل"];
                actionBtn.querySelector('span').innerText = labels[currentStep - 1];
            }
        }

        function handleStep() {
            if (currentStep <= totalSteps) {
                // فتح الرابط في نافذة جديدة
                window.open(smartLinks[currentStep - 1], '_blank');
                
                // تأثير بصري للتحميل
                actionBtn.disabled = true;
                actionBtn.querySelector('span').innerText = "جاري التحقق...";

                setTimeout(() => {
                    currentStep++;
                    
                    actionBtn.disabled = false;
                    updateUI();
                }, 1800);
            }
        }

        function toggleModal(show) {
            const modal = document.getElementById('codeModal');
            if (show) {
                modal.classList.remove('hidden');
            } else {
                modal.classList.add('hidden');
            }
        }

        // تشغيل النظام
        updateUI();
    </script>
</body>
</html>
