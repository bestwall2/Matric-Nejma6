<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Ready for Download</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        .step-inactive { display: none; }
    </style>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="max-w-md w-full glass rounded-3xl p-8 shadow-2xl text-center">
        <div class="mb-6">
            <div class="bg-blue-100 text-blue-600 w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M9 19l3 3m0 0l3-3m-3 3V10" />
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">Download Manager</h1>
            <p class="text-slate-500 text-sm mt-2">Complete the verification steps to unlock your file.</p>
        </div>

        <div class="w-full bg-slate-200 rounded-full h-2 mb-8">
            <div id="progressBar" class="bg-blue-600 h-2 rounded-full transition-all duration-500" style="width: 0%"></div>
        </div>

        <div id="stepContent">
            <p id="stepText" class="text-slate-700 font-medium mb-4 text-lg">Step 1 of 6</p>
            <button id="actionBtn" onclick="handleStep()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-transform active:scale-95">
                Verify Connection
            </button>
        </div>

        <div id="finalDownload" class="hidden">
            <p class="text-green-600 font-bold mb-4 italic text-lg">Verification Successful!</p>
            <a href="YOUR_ACTUAL_DOWNLOAD_URL" class="block w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 rounded-xl shadow-lg text-center">
                Download File Now
            </a>
        </div>

        <p class="mt-6 text-xs text-slate-400 uppercase tracking-widest">Secure Server Access</p>
    </div>

    <script>
        const totalSteps = 6;
        let currentStep = parseInt(localStorage.getItem('downloadProgress')) || 1;

        // Your Monetag Smart Links
        const smartLinks = [
            "https://smartlink1.com",
            "https://smartlink2.com",
            "https://smartlink3.com",
            "https://smartlink4.com",
            "https://smartlink5.com",
            "https://smartlink6.com"
        ];

        const actionBtn = document.getElementById('actionBtn');
        const stepText = document.getElementById('stepText');
        const progressBar = document.getElementById('progressBar');
        const stepContent = document.getElementById('stepContent');
        const finalDownload = document.getElementById('finalDownload');

        function updateUI() {
            if (currentStep > totalSteps) {
                stepContent.classList.add('hidden');
                finalDownload.classList.remove('hidden');
                progressBar.style.width = "100%";
            } else {
                stepText.innerText = `Step ${currentStep} of ${totalSteps}`;
                progressBar.style.width = `${((currentStep - 1) / totalSteps) * 100}%`;
                
                // Change button text based on step to look "technical"
                const labels = ["Verify Connection", "Check Latency", "Bypass Firewall", "Validate Token", "Secure Protocol", "Finalize Hash"];
                actionBtn.innerText = labels[currentStep - 1];
            }
        }

        function handleStep() {
            if (currentStep <= totalSteps) {
                // Open Smart Link in new tab
                window.open(smartLinks[currentStep - 1], '_blank');
                
                // Increment step and save
                currentStep++;
                localStorage.setItem('downloadProgress', currentStep);
                
                // Small delay before updating UI to make it feel like "processing"
                actionBtn.innerText = "Processing...";
                actionBtn.disabled = true;
                
                setTimeout(() => {
                    actionBtn.disabled = false;
                    updateUI();
                }, 1500);
            }
        }

        // Initialize on load
        updateUI();
    </script>
</body>
</html>
