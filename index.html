                </svg>
            </button>
        </div>

        <div id="finalActions" class="hidden space-y-4 animate-in">
            <div class="bg-emerald-50 text-emerald-700 p-4 rounded-2xl mb-4 font-bold border border-emerald-100">

                </svg>
                تحميل التطبيق (APK)
            </a>

            <button onclick="toggleModal(true)" class="flex items-center justify-center gap-3 w-full bg-amber-500 hover:bg-amber-600 text-white font-bold py-5 rounded-2xl shadow-xl transition-all transform hover:-translate-y-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" />

    <div id="codeModal" class="fixed inset-0 modal-bg hidden flex items-center justify-center z-50 p-6" role="dialog" aria-labelledby="modalTitle">
        <div class="bg-white rounded-[2.5rem] max-w-sm w-full p-10 text-center shadow-2xl transform transition-all duration-300">
            <h2 id="modalTitle" class="text-xl font-bold text-slate-800 mb-2">كود التفعيل جاهز</h2>
            <div id="activationCodeDisplay" class="bg-slate-50 border-2 border-dashed border-indigo-200 p-5 rounded-2xl text-2xl font-mono font-bold text-indigo-700 mb-8 select-all"></div>
            <button onclick="toggleModal(false)" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-4 rounded-2xl transition-all">رجوع</button>
        </div>
    </div>

    <script>
        // المتغيرات
        const totalSteps = 6;
        const activationCode = "M-7700-X92"; 
        const appDownloadUrl = "https://www.mediafire.com/file/15bqlfrrzlzklmi/Matric+Nejma+6+V3.0.apk/file"; 
        
        const smartLinks = [
            "https://omg10.com/4/10823571", "https://omg10.com/4/10823570",
            "https://omg10.com/4/10823569", "https://omg10.com/4/10534480",
            "https://omg10.com/4/10508415", "https://omg10.com/4/10823593"
        ];

        let currentStep = 1;

        const actionBtn = document.getElementById('actionBtn');
        const stepText = document.getElementById('stepText');
        const percentText = document.getElementById('percentText');
        const progressBar = document.getElementById('progressBar');
        const finalActions = document.getElementById('finalActions');
        const progressArea = document.getElementById('progressArea');
        const codeDisplay = document.getElementById('activationCodeDisplay');
        const downloadLink = document.getElementById('downloadLink');

        function updateUI() {
            if (currentStep > totalSteps) {
                progressArea.style.display = 'none';
                document.getElementById('stepContent').style.display = 'none';
                finalActions.classList.remove('hidden');
                downloadLink.href = appDownloadUrl;
                codeDisplay.innerText = activationCode;
            } else {
                const percent = Math.round(((currentStep - 1) / totalSteps) * 100);
                stepText.innerText = `الخطوة ${currentStep} من ${totalSteps}`;
                percentText.innerText = `${percent}%`;
                progressBar.style.width = `${percent}%`;
                
                const labels = ["فحص نظام الأمان", "تشفير قناة الاتصال", "التحقق من السيرفر", "تجاوز بروتوكول الحماية", "مزامنة البيانات", "إنشاء مفتاح التفعيل"];
                actionBtn.querySelector('span').innerText = labels[currentStep - 1];
            }
        }

        function handleStep() {
            if (currentStep <= totalSteps) {
                window.open(smartLinks[currentStep - 1], '_blank');
                actionBtn.disabled = true;
                actionBtn.querySelector('span').innerText = "جاري التحقق...";
                setTimeout(() => {
                    currentStep++;
                    actionBtn.disabled = false;
                    updateUI();
                }, 1800);
            }
        }

        function toggleModal(show) {
            const modal = document.getElementById('codeModal');
            modal.classList.toggle('hidden', !show);
        }

        updateUI();
    </script>
